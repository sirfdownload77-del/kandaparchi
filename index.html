<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صرافہ وزن پرچی (نگینہ گرام + پرنٹ فکس)</title>
    <style>
        /* عمومی اسٹائل (اسکرین کے لیے) */
        body {
            font-family: 'Noto Naskh Arabic', 'Jameel Noori Nastaleeq', 'Urdu Typesetting', 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecf2 100%);
            margin: 0;
            padding: 20px;
            direction: rtl;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            border-radius: 20px;
            padding: 20px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 1px solid #d0d9e0;
        }
        h2 {
            text-align: center;
            color: #1e3c5c;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 3px solid #c9a959;
            padding-bottom: 8px;
            font-size: 26px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }
        label {
            display: block;
            font-weight: bold;
            margin: 6px 0 2px;
            color: #2c3e50;
            font-size: 15px;
        }
        input, select, button {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #b0c4de;
            border-radius: 6px;
            font-size: 15px;
            font-family: inherit;
            direction: ltr;
            text-align: left;
            background: #fefefe;
            transition: all 0.2s;
        }
        input:focus, select:focus {
            border-color: #c9a959;
            box-shadow: 0 0 5px rgba(201,169,89,0.3);
            outline: none;
        }
        .row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .row > div {
            flex: 1;
            min-width: 70px;
        }
        button {
            background: #1e3c5c;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-top: 12px;
            transition: background 0.3s, transform 0.1s;
            font-size: 17px;
            letter-spacing: 1px;
        }
        button:hover {
            background: #2a4e72;
            transform: scale(1.02);
        }
        .readonly-item {
            background: #edf2f7;
            padding: 8px 10px;
            border-radius: 6px;
            text-align: center;
            font-size: 16px;
            border: 1px solid #cbd5e0;
            color: #1e3c5c;
            font-weight: 500;
            margin-top: 2px;
        }
        .hidden {
            display: none;
        }
        #customCategoryDiv {
            margin-top: 5px;
            background: #f8f4e8;
            padding: 8px;
            border-radius: 6px;
            border-right: 3px solid #c9a959;
        }
        .preview-receipt {
            margin-top: 20px;
            border: 2px dashed #c9a959;
            padding: 12px;
            background: #fefcf6;
            font-size: 14px;
            border-radius: 10px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
        }
        .preview-receipt h4 {
            color: #1e3c5c;
            margin-top: 0;
            margin-bottom: 8px;
            border-bottom: 1px solid #c9a959;
            padding-bottom: 5px;
        }
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }
        .checkbox-row input {
            width: auto;
            margin: 0;
        }
        .checkbox-row label {
            margin: 0;
            font-weight: normal;
        }
        .section-title {
            background: #f0e6d2;
            padding: 5px 10px;
            border-radius: 20px;
            margin-top: 15px;
            font-weight: bold;
            color: #1e3c5c;
        }
        .gram-display {
            background: #e0e7ef;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 14px;
            text-align: center;
            margin-top: 5px;
            border: 1px solid #b4945a;
        }

        /* پرنٹ اسٹائل */
        .printable {
            display: none;
        }

        @media print {
            @page {
                size: A4 landscape;
                margin: 0.2in;
            }
            body * {
                visibility: hidden;
            }
            .printable, .printable * {
                visibility: visible;
            }
            .printable {
                display: block;
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: #f9f6f0;
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                overflow: hidden; /* کوئی اضافی سکرول نہ ہو */
            }
            .receipt-container {
                display: flex;
                flex-wrap: nowrap;
                width: 100%;
                height: 100%;
                gap: 10px;
                justify-content: center;
                align-items: center;
                padding: 5px;
                box-sizing: border-box;
            }
            .receipt {
                width: 49%;
                height: auto;
                max-height: 100%;
                background: white;
                border: 2px solid #b4945a;
                border-radius: 30px;
                padding: 15px 12px;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                page-break-inside: avoid;
                font-size: 14pt;
                box-shadow: 0 10px 25px rgba(0,0,0,0.2);
                background: linear-gradient(165deg, #fffdf7 0%, #fff 100%);
                position: relative;
                overflow: hidden;
                box-sizing: border-box;
            }
            .receipt::before {
                content: "⚖️";
                position: absolute;
                top: -15px;
                right: -15px;
                font-size: 80px;
                opacity: 0.08;
                transform: rotate(15deg);
                pointer-events: none;
            }
            .shop-info {
                text-align: center;
                font-size: 16pt;
                font-weight: bold;
                color: #1e3c5c;
                margin: 0 0 8px;
                background: #e9e2d0;
                padding: 5px 10px;
                border-radius: 40px;
                border: 2px solid #c9a959;
            }
            .category-print {
                text-align: center;
                font-size: 14pt;
                color: #2a4e72;
                margin-bottom: 8px;
            }
            .weight-table {
                width: 100%;
                border-collapse: collapse;
                margin: 5px 0;
                font-size: 12pt;
                background: white;
                border-radius: 12px;
                overflow: hidden;
                box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            }
            .weight-table th, .weight-table td {
                padding: 4px 2px;
                border: 1px solid #d4b68a;
                text-align: center;
            }
            .weight-table th {
                background: #f3ede1;
                color: #1e3c5c;
                font-weight: bold;
            }
            .weight-table td {
                background: white;
            }
            .row-label {
                font-weight: bold;
                background: #f3ede1;
                width: 12%;
            }
            .calculation-note {
                margin: 3px 0;
                padding: 3px;
                background: #fcf8e7;
                border-radius: 20px;
                font-size: 11pt;
                text-align: center;
                border: 1px dashed #c9a959;
            }
            .price-section {
                display: flex;
                justify-content: space-between;
                margin-top: 8px;
                padding: 4px 8px;
                background: #e9e2d0;
                border-radius: 30px;
                font-size: 13pt;
            }
            .footer-date {
                display: flex;
                justify-content: space-between;
                margin-top: 8px;
                font-size: 11pt;
                color: #2c3e50;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>⚖️ صرافہ وزن پرچی (نگینہ گرام + پرنٹ فکس)</h2>

        <!-- دکان دار کا نام و پتہ -->
        <div style="margin-bottom:15px; background:#fcf8e7; padding:10px; border-radius:10px; border:1px solid #c9a959;">
            <label>دکان دار کا نام</label>
            <input type="text" id="shopName" value="وزن پرچی سروسز" placeholder="نام">
            <label>پتہ</label>
            <input type="text" id="shopAddress" value="صرافہ بازار ملتان" placeholder="پتہ">
        </div>

        <!-- زمرہ + دستی نام -->
        <div>
            <label>زمرہ</label>
            <select id="category" onchange="toggleCustomCategory()">
		<option value="چاندی">چاندی</option>
                <option value="سونا">سونا</option>
                <option value="انگوٹھی">انگوٹھی</option>
                <option value="سیٹ">سیٹ</option>
                <option value="زیور">زیور</option>
                <option value="custom">دستی (کوئی بھی نام)</option>
            </select>
        </div>

        <!-- خانہ برائے دستی نام -->
        <div id="customCategoryDiv" class="hidden">
            <label>دستی نام لکھیں (مثلاً: زیرو، پرانا وغیرہ)</label>
            <input type="text" id="customCategory" placeholder="یہاں لکھیں" oninput="calculateNet()">
        </div>

        <!-- کل وزن: گرام + تولہ/ماشہ/رتی -->
        <label>کل وزن (گرام میں)</label>
        <input type="number" id="gramsInput" step="any" value="0" min="0" placeholder="مثلاً 11.66" oninput="updateFromGrams()">

        <label>کل وزن (تولہ، ماشہ، رتی) — رتی اعشاریہ</label>
        <div class="row">
            <div><input type="number" id="wtTola" step="any" value="0" min="0" placeholder="تولہ" oninput="updateFromTMR()"></div>
            <div><input type="number" id="wtMasha" step="any" value="0" min="0" placeholder="ماشہ" oninput="updateFromTMR()"></div>
            <div><input type="number" id="wtRatti" step="any" value="0" min="0" placeholder="رتی" oninput="updateFromTMR()"></div>
        </div>

        <!-- تناسب والی کٹوتی -->
        <div class="section-title">📉 کاٹ (تناسب والی)</div>
        <label>کاٹ کی قسم</label>
        <select id="rateType" onchange="calculateNet()">
            <option value="rattiPerMasha">🔹 رتی فی ماشہ</option>
            <option value="rattiPerTola">🔸 رتی فی تولہ</option>
            <option value="mashaPerTola">🔸 ماشہ فی تولہ</option>
            <option value="tolaPer100Tola">🔹 تولہ فی 100 تولہ</option>
        </select>

        <label>مقدار (مثلاً 1، 2، 0.5)</label>
        <input type="number" id="rateAmount" step="any" value="0" min="0" oninput="calculateNet()">

        <!-- فکس کٹوتی (نگینہ) -->
        <div class="section-title">💎 نگینہ (فکس کاٹ)</div>
        <label>نگینہ (تولہ، ماشہ، رتی) — اگر نہ ہو تو 0 رکھیں</label>
        <div class="row">
            <div><input type="number" id="fixedTola" step="any" value="0" min="0" placeholder="تولہ" oninput="updateFixedFromTMR()"></div>
            <div><input type="number" id="fixedMasha" step="any" value="0" min="0" placeholder="ماشہ" oninput="updateFixedFromTMR()"></div>
            <div><input type="number" id="fixedRatti" step="any" value="0" min="0" placeholder="رتی" oninput="updateFixedFromTMR()"></div>
        </div>

        <label>نگینہ (گرام میں) — متبادل</label>
        <input type="number" id="fixedGrams" step="any" value="0" min="0" placeholder="مثلاً 2.5" oninput="updateFixedFromGrams()">

        <!-- کل کٹوتی (خودکار) -->
        <label>کُل کٹوتی (تناسب + نگینہ)</label>
        <div class="readonly-item" id="totalCutDisplay">0 تولہ 0 ماشہ 0.00 رتی (0.00 گرام)</div>

        <!-- خالص وزن (خودکار) -->
        <label>خالص وزن</label>
        <div class="readonly-item" id="netDisplay">0 تولہ 0 ماشہ 0.00 رتی (0.00 گرام)</div>

        <!-- فی تولہ ریٹ -->
        <label>فی تولہ ریٹ (روپے)</label>
        <input type="number" id="ratePerTola" step="any" value="0" min="0" placeholder="مثلاً 120000" oninput="calculateNet()">

        <!-- کل قیمت -->
        <label>کل قیمت (روپے)</label>
        <div class="readonly-item" id="totalPriceDisplay">0.00</div>

        <!-- چیک باکس: پرنٹ میں کل قیمت دکھائیں یا نہیں -->
        <div class="checkbox-row">
            <input type="checkbox" id="showPriceCheckbox" checked>
            <label>پرنٹ میں کل قیمت دکھائیں</label>
        </div>

        <!-- بٹنوں کی قطار -->
        <div style="display: flex; gap: 10px;">
            <button onclick="printReceipt()" style="flex: 2;">🖨️ خوبصورت پرنٹ کریں (دو پرچیاں)</button>
            <button onclick="resetAll()" style="flex: 1; background: #c9a959;">🔄 ری سیٹ کریں</button>
        </div>

        <!-- پیش منظر -->
        <div class="preview-receipt" id="preview">
            <h4>پیش منظر (پرنٹ کی جھلک)</h4>
            <div id="previewContent"></div>
        </div>
    </div>

    <!-- پرنٹ ایبل ایریا -->
    <div class="printable" id="printableArea">
        <div class="receipt-container" id="receiptContainer"></div>
    </div>

    <script>
        // Constants
        const GRAM_PER_RATTI = 0.1215;
        const GRAM_PER_MASHA = 0.972;      // 8 ratti
        const GRAM_PER_TOLA  = 11.6638;     // 96 ratti
        const EPS = 1e-6;

        let isUpdating = false;
        let isUpdatingFixed = false; // نگینہ کے لیے علیحدہ
        let grossRatti = 0;
        let proportionalCutRatti = 0;
        let fixedCutRatti = 0;
        let totalCutRatti = 0;
        let netRatti = 0;
        let rateTypeText = '';
        let rateAmount = 0;

        // Conversion functions
        function tmrToRatti(tola, masha, ratti) {
            return (tola * 96) + (masha * 8) + ratti;
        }

        function rattiToTMR(ratti) {
            const tola = Math.floor(ratti / 96);
            let rem = ratti % 96;
            const masha = Math.floor(rem / 8);
            const rattifrac = rem % 8;
            return { tola, masha, ratti: rattifrac };
        }

        function rattiToDecimalTola(ratti) {
            return ratti / 96;
        }

        function rattiToGrams(ratti) {
            return ratti * GRAM_PER_RATTI;
        }

        // Split grams into kg, g, mg (integer values)
        function splitGrams(grams) {
            const totalMg = Math.round(grams * 1000);
            const kg = Math.floor(totalMg / 1000000);
            const remainingMg = totalMg % 1000000;
            const g = Math.floor(remainingMg / 1000);
            const mg = remainingMg % 1000;
            return { kg, g, mg };
        }

        // نگینہ کے TMR سے گرام اپ ڈیٹ
        function updateFixedFromTMR() {
            if (isUpdatingFixed) return;
            isUpdatingFixed = true;

            const fixedT = parseFloat(document.getElementById('fixedTola').value) || 0;
            const fixedM = parseFloat(document.getElementById('fixedMasha').value) || 0;
            const fixedR = parseFloat(document.getElementById('fixedRatti').value) || 0;
            const fixedRattiTotal = tmrToRatti(fixedT, fixedM, fixedR);
            const fixedGrams = fixedRattiTotal * GRAM_PER_RATTI;
            document.getElementById('fixedGrams').value = fixedGrams.toFixed(2);

            isUpdatingFixed = false;
            calculateNet(); // باقی حساب
        }

        // نگینہ کے گرام سے TMR اپ ڈیٹ
        function updateFixedFromGrams() {
            if (isUpdatingFixed) return;
            isUpdatingFixed = true;

            const fixedGrams = parseFloat(document.getElementById('fixedGrams').value) || 0;
            const fixedRattiTotal = fixedGrams / GRAM_PER_RATTI;
            const tmr = rattiToTMR(fixedRattiTotal);

            document.getElementById('fixedTola').value = tmr.tola;
            document.getElementById('fixedMasha').value = tmr.masha;
            document.getElementById('fixedRatti').value = tmr.ratti.toFixed(2);

            isUpdatingFixed = false;
            calculateNet();
        }

        window.toggleCustomCategory = function() {
            const cat = document.getElementById('category').value;
            const div = document.getElementById('customCategoryDiv');
            if (cat === 'custom') {
                div.classList.remove('hidden');
            } else {
                div.classList.add('hidden');
            }
            calculateNet();
        };

        function getCurrentCategory() {
            const cat = document.getElementById('category').value;
            if (cat === 'custom') {
                const custom = document.getElementById('customCategory').value.trim();
                return custom || 'دستی';
            }
            return cat;
        }

        window.updateFromGrams = function() {
            if (isUpdating) return;
            isUpdating = true;

            const grams = parseFloat(document.getElementById('gramsInput').value) || 0;
            const totalRatti = grams / GRAM_PER_RATTI;
            const tmr = rattiToTMR(totalRatti);

            document.getElementById('wtTola').value = tmr.tola;
            document.getElementById('wtMasha').value = tmr.masha;
            document.getElementById('wtRatti').value = tmr.ratti.toFixed(2);

            isUpdating = false;
            calculateNet();
        };

        window.updateFromTMR = function() {
            if (isUpdating) return;
            isUpdating = true;

            const tola = parseFloat(document.getElementById('wtTola').value) || 0;
            const masha = parseFloat(document.getElementById('wtMasha').value) || 0;
            const ratti = parseFloat(document.getElementById('wtRatti').value) || 0;

            const totalRatti = tmrToRatti(tola, masha, ratti);
            const grams = totalRatti * GRAM_PER_RATTI;

            document.getElementById('gramsInput').value = grams.toFixed(2);

            isUpdating = false;
            calculateNet();
        };

        window.calculateNet = function() {
            // Gross weight
            const wtT = parseFloat(document.getElementById('wtTola').value) || 0;
            const wtM = parseFloat(document.getElementById('wtMasha').value) || 0;
            const wtR = parseFloat(document.getElementById('wtRatti').value) || 0;
            grossRatti = tmrToRatti(wtT, wtM, wtR);

            // Proportional cut
            const rateType = document.getElementById('rateType').value;
            rateAmount = parseFloat(document.getElementById('rateAmount').value) || 0;

            // Store text for display
            switch (rateType) {
                case 'rattiPerMasha': rateTypeText = `${rateAmount} رتی فی ماشہ`; break;
                case 'rattiPerTola': rateTypeText = `${rateAmount} رتی فی تولہ`; break;
                case 'mashaPerTola': rateTypeText = `${rateAmount} ماشہ فی تولہ`; break;
                case 'tolaPer100Tola': rateTypeText = `${rateAmount} تولہ فی 100 تولہ`; break;
                default: rateTypeText = '';
            }

            proportionalCutRatti = 0;
            if (rateType === 'rattiPerMasha') {
                const totalMasha = grossRatti / 8;
                proportionalCutRatti = rateAmount * totalMasha;
            } else if (rateType === 'rattiPerTola') {
                const totalTola = grossRatti / 96;
                proportionalCutRatti = rateAmount * totalTola;
            } else if (rateType === 'mashaPerTola') {
                const totalTola = grossRatti / 96;
                const subtractMasha = rateAmount * totalTola;
                proportionalCutRatti = subtractMasha * 8;
            } else if (rateType === 'tolaPer100Tola') {
                const totalTola = grossRatti / 96;
                const subtractTola = (rateAmount / 100) * totalTola;
                proportionalCutRatti = subtractTola * 96;
            }

            // Fixed cut
            const fixedT = parseFloat(document.getElementById('fixedTola').value) || 0;
            const fixedM = parseFloat(document.getElementById('fixedMasha').value) || 0;
            const fixedR = parseFloat(document.getElementById('fixedRatti').value) || 0;
            fixedCutRatti = tmrToRatti(fixedT, fixedM, fixedR);

            // Total cut and net
            totalCutRatti = proportionalCutRatti + fixedCutRatti;
            netRatti = grossRatti - totalCutRatti;

            // Display total cut
            const cutTMR = rattiToTMR(totalCutRatti);
            const cutGrams = totalCutRatti * GRAM_PER_RATTI;
            document.getElementById('totalCutDisplay').innerText = 
                `${cutTMR.tola} تولہ ${cutTMR.masha} ماشہ ${cutTMR.ratti.toFixed(2)} رتی (${cutGrams.toFixed(2)} گرام)`;

            // Display net weight
            const netTMR = rattiToTMR(netRatti);
            const netGrams = netRatti * GRAM_PER_RATTI;
            document.getElementById('netDisplay').innerText = 
                `${netTMR.tola} تولہ ${netTMR.masha} ماشہ ${netTMR.ratti.toFixed(2)} رتی (${netGrams.toFixed(2)} گرام)`;

            // Total price
            const netTolaDecimal = rattiToDecimalTola(netRatti);
            const ratePerTola = parseFloat(document.getElementById('ratePerTola').value) || 0;
            const totalPrice = netTolaDecimal * ratePerTola;
            document.getElementById('totalPriceDisplay').innerText = totalPrice.toFixed(2);

            // Update preview
            updatePreview();
        };

        function updatePreview() {
            const categoryDisplay = getCurrentCategory();
            const wtT = document.getElementById('wtTola').value || '0';
            const wtM = document.getElementById('wtMasha').value || '0';
            const wtR = document.getElementById('wtRatti').value || '0';
            const grams = document.getElementById('gramsInput').value || '0';
            const ratePerTola = document.getElementById('ratePerTola').value || '0';
            const totalCut = document.getElementById('totalCutDisplay').innerText;
            const netDisplay = document.getElementById('netDisplay').innerText;
            const totalPrice = document.getElementById('totalPriceDisplay').innerText;

            const now = new Date();
            const dateStr = now.toLocaleDateString('ur-PK') + ' ' + now.toLocaleTimeString('ur-PK');

            document.getElementById('previewContent').innerHTML = `
                <table style="width:100%; border-collapse:collapse; direction:rtl;">
                    <tr><td class="label">زمرہ</td><td>${categoryDisplay}</td></tr>
                    <tr><td class="label">کل وزن</td><td>${wtT} تولہ ${wtM} ماشہ ${wtR} رتی (${grams} گرام)</td></tr>
                    <tr><td class="label">کاٹ کی قسم</td><td>${rateTypeText || 'کوئی نہیں'}</td></tr>
                    <tr><td class="label">کُل کٹوتی</td><td>${totalCut}</td></tr>
                    <tr><td class="label">خالص وزن</td><td>${netDisplay}</td></tr>
                    <tr><td class="label">فی تولہ ریٹ</td><td>${ratePerTola} روپے</td></tr>
                    <tr><td class="label">کل قیمت</td><td>${totalPrice} روپے</td></tr>
                    <tr><td class="label">تاریخ/وقت</td><td>${dateStr}</td></tr>
                </table>
            `;
        }

        // Prepare printable receipts with always four rows
        function preparePrintable() {
            // Gross weight
            const wtT = document.getElementById('wtTola').value || '0';
            const wtM = document.getElementById('wtMasha').value || '0';
            const wtR = document.getElementById('wtRatti').value || '0';
            const grossGrams = grossRatti * GRAM_PER_RATTI;
            const grossSplit = splitGrams(grossGrams);
            
            // Proportional cut (کاٹ)
            const propTMR = rattiToTMR(proportionalCutRatti);
            const propGrams = proportionalCutRatti * GRAM_PER_RATTI;
            const propSplit = splitGrams(propGrams);
            
            // Fixed cut (نگینہ)
            const fixedTMR = rattiToTMR(fixedCutRatti);
            const fixedGrams = fixedCutRatti * GRAM_PER_RATTI;
            const fixedSplit = splitGrams(fixedGrams);
            
            // Net weight (خالص)
            const netTMR = rattiToTMR(netRatti);
            const netGrams = netRatti * GRAM_PER_RATTI;
            const netSplit = splitGrams(netGrams);
            
            // Price
            const showPrice = document.getElementById('showPriceCheckbox').checked;
            const ratePerTola = document.getElementById('ratePerTola').value || '0';
            const totalPrice = document.getElementById('totalPriceDisplay').innerText;

            const shopName = document.getElementById('shopName').value;
            const shopAddress = document.getElementById('shopAddress').value;
            const fullShop = shopName + ' ' + shopAddress;
            const categoryDisplay = getCurrentCategory();

            const now = new Date();
            const dateStr = now.toLocaleDateString('ur-PK');

            const hasProportional = proportionalCutRatti > EPS;
            const hasFixed = fixedCutRatti > EPS;
            const hasAnyCut = hasProportional || hasFixed;

            // Always show all four rows
            const tableRows = `
                <tr>
                    <td class="row-label">وزن</td>
                    <td>${wtT}</td>
                    <td>${wtM}</td>
                    <td>${parseFloat(wtR).toFixed(2)}</td>
                    <td>${grossSplit.kg}</td>
                    <td>${grossSplit.g}</td>
                    <td>${grossSplit.mg}</td>
                </tr>
                <tr>
                    <td class="row-label">کاٹ</td>
                    <td>${hasProportional ? propTMR.tola : ''}</td>
                    <td>${hasProportional ? propTMR.masha : ''}</td>
                    <td>${hasProportional ? propTMR.ratti.toFixed(2) : ''}</td>
                    <td>${hasProportional ? propSplit.kg : ''}</td>
                    <td>${hasProportional ? propSplit.g : ''}</td>
                    <td>${hasProportional ? propSplit.mg : ''}</td>
                </tr>
                <tr>
                    <td class="row-label">نگینہ</td>
                    <td>${hasFixed ? fixedTMR.tola : ''}</td>
                    <td>${hasFixed ? fixedTMR.masha : ''}</td>
                    <td>${hasFixed ? fixedTMR.ratti.toFixed(2) : ''}</td>
                    <td>${hasFixed ? fixedSplit.kg : ''}</td>
                    <td>${hasFixed ? fixedSplit.g : ''}</td>
                    <td>${hasFixed ? fixedSplit.mg : ''}</td>
                </tr>
                <tr>
                    <td class="row-label">خالص</td>
                    <td>${hasAnyCut ? netTMR.tola : ''}</td>
                    <td>${hasAnyCut ? netTMR.masha : ''}</td>
                    <td>${hasAnyCut ? netTMR.ratti.toFixed(2) : ''}</td>
                    <td>${hasAnyCut ? netSplit.kg : ''}</td>
                    <td>${hasAnyCut ? netSplit.g : ''}</td>
                    <td>${hasAnyCut ? netSplit.mg : ''}</td>
                </tr>
            `;

            // Calculation note for proportional cut (only if it exists)
            const calcNote = (hasProportional && rateTypeText) ? 
                `<div class="calculation-note">کاٹ کا حساب: ${rateTypeText}</div>` : '';

            const receiptHTML = `
                <div class="receipt">
                    <div class="shop-info">${fullShop}</div>
                    <div class="category-print">زمرہ: ${categoryDisplay}</div>
                    
                    <table class="weight-table">
                        <thead>
                            <tr>
                                <th></th>
                                <th>تولہ</th>
                                <th>ماشہ</th>
                                <th>رتی</th>
                                <th>کلو</th>
                                <th>گرام</th>
                                <th>ملی</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tableRows}
                        </tbody>
                    </table>

                    ${calcNote}

                    <div class="price-section">
                        <span>فی تولہ: ${ratePerTola} روپے</span>
                        ${showPrice ? `<span>کل قیمت: ${totalPrice} روپے</span>` : ''}
                    </div>

                    <div class="footer-date">
                        <span>تاریخ: ${dateStr}</span>
                        <span>اللہ تعالیٰ برکت عطا فرمائے</span>
                    </div>
                </div>
            `;

            const container = document.getElementById('receiptContainer');
            container.innerHTML = receiptHTML + receiptHTML; // دو پرچیاں
        }

        window.printReceipt = function() {
            preparePrintable();
            window.print();
        };

        // ری سیٹ فنکشن
        window.resetAll = function() {
            document.getElementById('gramsInput').value = '0';
            document.getElementById('wtTola').value = '0';
            document.getElementById('wtMasha').value = '0';
            document.getElementById('wtRatti').value = '0';
            document.getElementById('rateAmount').value = '0';
            document.getElementById('fixedTola').value = '0';
            document.getElementById('fixedMasha').value = '0';
            document.getElementById('fixedRatti').value = '0';
            document.getElementById('fixedGrams').value = '0';
            document.getElementById('ratePerTola').value = '0';
            document.getElementById('category').value = 'چاندی';
            document.getElementById('showPriceCheckbox').checked = true;
            document.getElementById('customCategoryDiv').classList.add('hidden');
            document.getElementById('customCategory').value = '';
            
            // حساب اپ ڈیٹ
            calculateNet();
        };

        window.onload = function() {
            toggleCustomCategory();
            updateFromTMR();
            updateFixedFromTMR(); // نگینہ کے گرام کو ہم آہنگ کریں
        };
    </script>
</body>
</html>
